      <div class="contactform">
        <h1>Contact me for work</h1>
        <form>
          <div class="mb-3">
            <label for="clientemail" class="form-label">Name</label>
            <input type="name" class="form-control" id="clientname" aria-describedby="emailHelp">
          </div>
          <div class="mb-3">
            <label for="clientemail" class="form-label">Email address</label>
            <input type="email" class="form-control" id="clientemail" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text">We'll never share your email & phone with anyone else.</div>
          </div>
          <div class="mb-3">
            <label for="clientPhone" class="form-label">Phone</label>
            <input type="phone" class="form-control" id="exampleInputPassword1">
          </div>
          <div class="mb-3">
            <label for="clientemail" class="form-label">Enquiry</label>
            <input type="enquiry" class="form-control" id="enquiry" aria-describedby="emailHelp">
          </div>
          <div class="mb-3" id="form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">I want to work with you</label>
          </div>

          <button type="submit" class="btn btn-sm">Submit</button>
        </form>
